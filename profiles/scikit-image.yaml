name: scikit-image
version: "0.1.0"
description: >-
  Image processing library built on NumPy arrays, part of the
  scientific Python (SciPy) ecosystem.
language: python

approved_directories:
  - skimage/color/
  - skimage/data/
  - skimage/draw/
  - skimage/exposure/
  - skimage/feature/
  - skimage/filters/
  - skimage/graph/
  - skimage/io/
  - skimage/measure/
  - skimage/metrics/
  - skimage/morphology/
  - skimage/registration/
  - skimage/restoration/
  - skimage/segmentation/
  - skimage/transform/
  - skimage/util/

forbidden_paths:
  - skimage/_shared/
  - skimage/_vendored/
  - skimage/_build/
  - skimage/__pycache__/

test_conventions:
  framework: pytest
  file_pattern: "test_*.py"
  location_pattern: "{module}/tests/"
  required_patterns:
    - shape preservation test
    - dtype roundtrip test
  run_command: "spin test"

deprecated_apis:
  - symbol: skimage.filters.median
    replacement: skimage.filters.rank.median
    reason: Moved to rank submodule for consistency
    since_version: "0.23"
  - symbol: skimage.measure.marching_cubes_lewiner
    replacement: skimage.measure.marching_cubes
    reason: Consolidated into single marching_cubes function
    since_version: "0.19"
  - symbol: skimage.transform.estimate_transform
    replacement: skimage.transform.AffineTransform.estimate
    reason: Refactored to class method pattern
    since_version: "0.22"

docstring_convention:
  style: numpydoc
  required_sections:
    - Parameters
    - Returns
    - Examples
  array_shape_notation: true

contribution_checklist:
  - Source file in an approved directory
  - Test file in {module}/tests/test_{name}.py
  - NumPy-style docstring with Parameters, Returns, Examples
  - Array parameters documented with shape notation (M, N)
  - No imports from _shared or _vendored modules
  - No usage of deprecated APIs
  - Gallery example for new public functions
  - Run spin build && spin test before submitting

naming_convention: snake_case
import_convention: "import skimage as ski"

# Fallback when no keyword or module name matches the task.
default_directory: "skimage/filters/"

# Routes a scaffold task to a module. Keywords match on a word boundary,
# so prefixes (e.g. "equaliz") match "equalization"/"equalize" without the
# false substring hits that plagued naive matching (e.g. "io" in
# "equalizatION"). First module with a matching keyword wins.
directory_keywords:
  exposure:
    [histogram, equaliz, contrast, gamma, intensity, exposure, sigmoid]
  filters:
    [filter, edge, threshold, gaussian, blur, sobel, sharpen, gabor, unsharp]
  restoration:
    [denois, deconvolv, restor, inpaint, wiener, richardson, rolling ball]
  segmentation:
    [segment, watershed, slic, felzenszwalb, chan vese, boundaries, random walker]
  morphology:
    [morpholog, erode, erosion, dilate, dilation, opening, closing, skeleton, tophat]
  transform:
    [transform, rotate, resize, rescale, warp, swirl, pyramid, radon, hough]
  color:
    [color, colour, rgb, grayscale, greyscale, hsv, colorspace]
  measure:
    [measure, regionprop, moments, perimeter, contour, marching cubes]
  feature:
    [feature, corner, blob, descriptor, canny, hog, daisy, local binary]
  registration:
    [registration, register, optical flow, phase cross]
  metrics:
    [metric, ssim, psnr, structural similarity, mean squared, hausdorff]
  graph:
    [pixel graph, rag, region adjacency]
  draw:
    [draw, polygon, ellipse, bezier, circle perimeter]
  io:
    [imread, imsave, imshow, image collection, read image, write image]
  util:
    [montage, view as blocks, view as windows, img as float, img as ubyte]

role_brief_templates:
  - role: engineer
    sections:
      - Implementation Checklist
      - File Map
      - Convention Reminders
    focus: "What files to create, where, and what patterns to follow"
  - role: pm
    sections:
      - Scope
      - User Impact
      - What to Ask in Kickoff
    focus: "Business value and scope boundaries"
  - role: qa
    sections:
      - Test Strategy
      - Edge Cases to Watch
      - Test Names We Will Reject
    focus: "Test coverage, edge cases, and quality gates"
  - role: devops
    sections:
      - CI Guardrails
      - Pipeline Signal
      - Boundary Enforcement
    focus: "What CI checks, what blocks merge, what boundaries are enforced"
